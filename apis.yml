name: BTCPay Server
description: >-
  BTCPay Server is a self-hosted, open-source Bitcoin and cryptocurrency payment
  processor with a comprehensive REST API (Greenfield API v1) for managing
  stores, invoices, wallets, Lightning Network nodes, payment requests, pull
  payments, webhooks, users, and server configuration. It operates with zero
  fees, no third-party dependency, and is released under the MIT license.
image: https://btcpayserver.org/images/btcpay-logo.svg
tags:
  - Bitcoin
  - Cryptocurrency
  - Payments
  - Lightning Network
  - Open Source
  - Self-Hosted
created: "2026-06-13"
modified: "2026-06-13"
url: https://raw.githubusercontent.com/api-evangelist/btcpay/refs/heads/main/apis.yml
specificationVersion: "0.19"
apis:
  - name: BTCPay Server Greenfield API
    description: >-
      The Greenfield API is BTCPay Server's primary REST API, providing
      programmatic access to stores, invoices, wallets, Lightning Network nodes,
      payment requests, pull payments, payouts, webhooks, notifications, users,
      API keys, apps, files, reports, server health, and server configuration.
      Authentication is via API keys or HTTP Basic Auth. The OpenAPI 3.0
      specification is served at /swagger/v1/swagger.json on any BTCPay Server
      instance.
    image: https://btcpayserver.org/images/btcpay-logo.svg
    humanURL: https://docs.btcpayserver.org/API/Greenfield/v1/
    baseURL: https://{btcpay-host}/api/v1
    tags:
      - Bitcoin
      - Cryptocurrency
      - Payments
      - Lightning Network
      - Invoices
      - Wallets
